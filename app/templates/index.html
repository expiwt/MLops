<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kion RecSys — MLOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .metric-value { font-size: 1.2rem; font-weight: bold; }
        .history-scroll { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="mb-4">🎬 Kion RecSys — MLOps Dashboard</h1>

        <div class="row">
            <!-- Левая колонка: форма инференса -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">🔍 Получить рекомендации</h5>
                    </div>
                    <div class="card-body">
                        <form id="predictForm">
                            <div class="mb-3">
                                <label for="userId" class="form-label">ID пользователя</label>
                                <input type="number" class="form-control" id="userId" value="123" min="1">
                            </div>
                            <div class="mb-3">
                                <label for="topK" class="form-label">Количество рекомендаций</label>
                                <input type="number" class="form-control" id="topK" value="5" min="1" max="100">
                            </div>
                            <div class="mb-3">
                                <label for="modelType" class="form-label">Модель</label>
                                <select class="form-select" id="modelType">
                                    <option value="popular">Popular</option>
                                    <option value="tfidf">TF-IDF</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Получить рекомендации</button>
                        </form>
                        <div id="result" class="mt-3" style="display:none;"></div>
                    </div>
                </div>

                <!-- Статус моделей -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="mb-0">📊 Статус системы</h5>
                    </div>
                    <div class="card-body">
                        <div id="healthStatus">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Кнопка переобучения -->
                <div class="card mt-3">
                    <div class="card-body text-center">
                        <button id="retrainBtn" class="btn btn-warning btn-lg">
                            🔄 Запустить переобучение
                        </button>
                        <div id="retrainStatus" class="mt-2 text-muted"></div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка: ссылки -->
            <div class="col-md-6 mb-4">
                <div class="card mt-3">
                    <div class="card-body text-center">
                        <a href="http://localhost:5000" target="_blank" class="btn btn-outline-info">
                            📋 MLflow Experiments
                        </a>
                        <a href="http://localhost:9090" target="_blank" class="btn btn-outline-danger">
                            📊 Prometheus
                        </a>
                        <a href="http://localhost:3000" target="_blank" class="btn btn-outline-success">
                            📉 Grafana
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- История предсказаний -->
        <div class="card mt-2">
            <div class="card-header">
                <h5 class="mb-0">📋 История предсказаний</h5>
            </div>
            <div class="card-body">
                <div class="history-scroll">
                    <table class="table table-striped" id="historyTable">
                        <thead>
                            <tr>
                                <th>Время</th>
                                <th>User ID</th>
                                <th>Модель</th>
                                <th>Рекомендации</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr><td colspan="4" class="text-muted">Пока нет предсказаний</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === API helpers ===
        async function fetchHealth() {
            const r = await fetch('/health');
            return r.json();
        }

        // === Update UI ===
        function updateHealth(data) {
            document.getElementById('healthStatus').innerHTML = `
                <p class="mb-1">✅ Статус: <strong>${data.status}</strong></p>
                <p class="mb-0">Модели: <strong>${(data.loaded_models || []).join(', ') || '—'}</strong></p>
            `;
        }

        // === Load all data ===
        async function refreshAll() {
            try {
                const health = await fetchHealth();
                updateHealth(health);
            } catch (err) {
                console.error('Refresh error:', err);
            }
        }

        // === Predict ===
        document.getElementById('predictForm').onsubmit = async (e) => {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const topK = document.getElementById('topK').value;
            const modelType = document.getElementById('modelType').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = '<div class="spinner-border text-primary"></div>';
            resultDiv.style.display = 'block';

            try {
                const res = await fetch(`/predict/${userId}?top_k=${topK}&model_type=${modelType}`, { method: 'POST' });
                const data = await res.json();

                let html = '<h6>Рекомендации:</h6><ol>';
                data.recommendations.forEach(r => {
                    html += `<li>Фильм #${r.item_id}`;
                    if (r.score) html += ` (score: ${r.score.toFixed(3)})`;
                    html += '</li>';
                });
                html += '</ol>';

                resultDiv.innerHTML = html;

                // Добавляем в историю
                const tbody = document.getElementById('historyBody');
                const time = new Date().toLocaleTimeString();
                const items = data.recommendations.map(r => `#${r.item_id}`).join(', ');
                if (tbody.querySelector('td[colspan]')) tbody.innerHTML = '';
                tbody.innerHTML = `<tr><td>${time}</td><td>${userId}</td><td>${modelType}</td><td>${items}</td></tr>` + tbody.innerHTML;

                // Обновляем статус
                refreshAll();

            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-danger">Ошибка: ${err.message}</div>`;
            }
        };

        // === Retrain ===
        document.getElementById('retrainBtn').onclick = async () => {
            const statusDiv = document.getElementById('retrainStatus');
            statusDiv.textContent = '⏳ Запуск переобучения...';
            try {
                const res = await fetch('/retrain', { method: 'POST' });
                const data = await res.json();
                statusDiv.textContent = `✅ ${data.message}`;
            } catch (err) {
                statusDiv.textContent = `❌ Ошибка: ${err.message}`;
            }
        };

        // === Initial load ===
        refreshAll();

        // Auto-refresh every 30s
        setInterval(refreshAll, 30_000);
    </script>
</body>
</html>
