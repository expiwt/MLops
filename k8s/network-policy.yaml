apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: recsys-network-policy
  namespace: recsys
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Разрешаем входящий трафик с любого пода в том же namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: recsys
    # Разрешаем healthcheck probes от kubelet
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # Разрешаем трафик с ingress-контроллера
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Разрешаем Prometheus (для ServiceMonitor)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: prometheus
      ports:
        - port: 8000
    # Разрешаем Prometheus из kube-prometheus-stack (namespace monitoring)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000
        - port: 5000
  egress:
    # Разрешаем весь исходящий трафик (необходимо для pip install и т.д.)
    - {}
