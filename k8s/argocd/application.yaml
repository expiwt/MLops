apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-recsys
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/expiwt/MLops
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: recsys
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
