---
# =====================
# RECSYS API (fastapi-сервис)
# =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  namespace: recsys
  labels:
    app: recsys-api
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recsys-api
  template:
    metadata:
      labels:
        app: recsys-api
        component: api
    spec:
      containers:
        - name: recsys-api
          image: mlops-recsys-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http-api
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: recsys-config
                  key: LOG_LEVEL
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: recsys-config
                  key: MLFLOW_TRACKING_URI
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: recsys-config
                  key: APP_VERSION
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: recsys-api
  namespace: recsys
  labels:
    app: recsys-api
spec:
  selector:
    app: recsys-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP

---
# =====================
# MLflow server
# =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: recsys
  labels:
    app: mlflow
    component: tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        component: tracking
    spec:
      initContainers:
        - name: copy-mlflow-db
          image: mlops-recsys-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /app/mlflow.db /mlflow/mlflow.db
              echo "✅ mlflow.db скопирован"
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.12.0
          ports:
            - containerPort: 5000
              name: http-mlflow
          command:
            - mlflow
            - server
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
            - --allowed-hosts
            - "*"
            - --backend-store-uri
            - sqlite:////mlflow/mlflow.db
            - --default-artifact-root
            - /mlflow/artifacts
          env:
            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: MLFLOW_TRACKING_USERNAME
                  optional: true
            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: MLFLOW_TRACKING_PASSWORD
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: recsys
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP
