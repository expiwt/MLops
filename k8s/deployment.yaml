---
# =====================
# RECSYS API (fastapi-сервис)
# =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  namespace: recsys
  labels:
    app: recsys-api
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recsys-api
  template:
    metadata:
      labels:
        app: recsys-api
        component: api
    spec:
      initContainers:
        - name: init-data
          image: mlops-recsys-api:latest
          command:
            - sh
            - -c
            - |
              pip install -q dvc[s3] 2>/dev/null
              cd /app
              dvc remote default s3-storage
              dvc remote modify s3-storage url s3://kion-dvc-storage
              dvc remote modify s3-storage endpointurl https://storage.yandexcloud.net
              dvc remote modify s3-storage region ru-central1
              dvc pull
              # Копируем mlflow.db туда, где его ждёт MLflow
              if [ -f /app/mlflow.db ]; then
                cp /app/mlflow.db /mlflow/mlflow.db
                echo "mlflow.db скопирован в /mlflow/mlflow.db"
              else
                echo "mlflow.db не найден в /app/ — будет создан MLflow при старте"
              fi
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: AWS_DEFAULT_REGION
            - name: AWS_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: AWS_ENDPOINT_URL
          volumeMounts:
            - name: data-storage
              mountPath: /app/data
            - name: models-storage
              mountPath: /app/models
            - name: mlflow-storage
              mountPath: /mlflow
      containers:
        - name: recsys-api
          image: mlops-recsys-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http-api
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: recsys-config
                  key: LOG_LEVEL
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: recsys-config
                  key: MLFLOW_TRACKING_URI
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: recsys-config
                  key: APP_VERSION
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: data-storage
              mountPath: /app/data
            - name: models-storage
              mountPath: /app/models
      volumes:
        - name: data-storage
          persistentVolumeClaim:
            claimName: recsys-data-pvc
        - name: models-storage
          persistentVolumeClaim:
            claimName: recsys-models-pvc
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: recsys-api
  namespace: recsys
  labels:
    app: recsys-api
spec:
  selector:
    app: recsys-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP

---
# =====================
# MLflow server
# =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: recsys
  labels:
    app: mlflow
    component: tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        component: tracking
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.13.0
          ports:
            - containerPort: 5000
              name: http-mlflow
          command:
            - mlflow
            - server
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
            - --allowed-hosts
            - "localhost:5000,mlflow:5000"
            - --backend-store-uri
            - sqlite:////mlflow/mlflow.db
            - --default-artifact-root
            - /mlflow/artifacts
          env:
            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: MLFLOW_TRACKING_USERNAME
                  optional: true
            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recsys-secrets
                  key: MLFLOW_TRACKING_PASSWORD
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: recsys
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP
