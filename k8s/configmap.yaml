apiVersion: v1
kind: ConfigMap
metadata:
  name: recsys-config
  namespace: recsys
data:
  # Конфигурация сервиса
  APP_VERSION: "0.2.0"
  LOG_LEVEL: "INFO"
  PREDICT_TOP_K_DEFAULT: "10"
  PREDICT_TOP_K_MAX: "100"
  
  # MLflow
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  
  # Мониторинг
  PROMETHEUS_SCRAPE_INTERVAL: "15s"
---
apiVersion: v1
kind: Secret
metadata:
  name: recsys-secrets
  namespace: recsys
type: Opaque
stringData:
  # В production — менять на реальные значения через sealed-secrets / vault
  MLFLOW_TRACKING_USERNAME: ""
  MLFLOW_TRACKING_PASSWORD: ""
